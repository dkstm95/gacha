name: Go Release

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        run: VERSION="${GITHUB_REF_NAME#v}" sh scripts/build-release.sh

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
