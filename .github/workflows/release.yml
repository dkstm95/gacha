name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check
        run: make check

      - name: Build release artifacts
        run: VERSION="${GITHUB_REF_NAME#v}" sh scripts/build-release.sh

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
